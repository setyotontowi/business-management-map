<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Capabilities Framework Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1923;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #93c5fd;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  header p {
    color: #64748b;
    font-size: 0.9rem;
    margin-top: 0.4rem;
  }

  /* Tree */
  .tree {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  ul, ul ul {
    list-style: none;
    padding: 0;
    margin: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  /* ─── connector lines via pseudo-elements ─── */

  /* Vertical bar on the left of children */
  .children {
    padding-left: 1.5rem;
    border-left: 2px solid #1e3a5f;
    margin-left: 1rem;
    margin-top: 0.25rem;
  }

  .node-wrap {
    display: flex;
    flex-direction: column;
    margin: 0.25rem 0;
  }

  .node-wrap > .children {
    margin-top: 0;
  }

  /* Horizontal tick before each node */
  .node-wrap::before {
    content: '';
    display: none;
  }

  /* ─── Node pill ─── */
  .node {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 1rem;
    border-radius: 2rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    position: relative;
    font-size: 0.88rem;
    font-weight: 500;
    user-select: none;
    border: 1px solid transparent;
  }

  .node:hover {
    transform: translateX(4px) scale(1.03);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 10;
  }

  /* Level colors */
  .level-0 { background: #1e3a5f; color: #93c5fd; border-color: #2563eb; font-size: 1rem; font-weight: 700; }
  .level-1 { background: #1a2e44; color: #7dd3fc; border-color: #1e4070; }
  .level-2 { background: #162236; color: #a5b4fc; border-color: #1e3a6e; }
  .level-3 { background: #111b2b; color: #c4b5fd; border-color: #2e1d6b; }
  .level-4 { background: #0e1622; color: #d4c0fd; border-color: #3b2570; }

  /* ─── Dynamic Capabilities special node ─── */
  .dc-node {
    background: linear-gradient(135deg, #5b21b6, #2563eb) !important;
    color: #fff !important;
    border-color: #7c3aed !important;
    box-shadow: 0 0 14px rgba(124, 58, 237, 0.6), 0 0 30px rgba(37,99,235,0.3);
    font-weight: 700 !important;
  }

  .dc-node:hover {
    box-shadow: 0 0 20px rgba(124, 58, 237, 0.9), 0 0 40px rgba(37,99,235,0.5) !important;
  }

  .dc-label {
    font-size: 0.7rem;
    background: #7c3aed;
    color: #e9d5ff;
    padding: 0.1rem 0.4rem;
    border-radius: 1rem;
    letter-spacing: 0.05em;
  }

  /* Collapse toggle icon */
  .toggle-icon {
    font-size: 0.7rem;
    opacity: 0.6;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .collapsed > .children { display: none; }
  .collapsed .toggle-icon { transform: rotate(-90deg); }

  /* ─── Tooltip ─── */
  .tooltip {
    display: none;
    position: fixed;
    background: #1e293b;
    border: 1px solid #334155;
    color: #cbd5e1;
    font-size: 0.8rem;
    padding: 0.6rem 0.9rem;
    border-radius: 0.5rem;
    max-width: 280px;
    line-height: 1.5;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 1000;
  }

  /* ─── Legend ─── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: center;
    margin-top: 2.5rem;
    font-size: 0.78rem;
    color: #64748b;
  }

  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%;
  }

  /* ─── Animate in ─── */
  .node-wrap {
    opacity: 0;
    transform: translateX(-10px);
    animation: fadeIn 0.3s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<header>
  <h1>Business Management Framework Map</h1>
  <p>Where <strong style="color:#a78bfa">Dynamic Capabilities</strong> fits within organizational strategy · Click nodes to expand/collapse · Hover for details</p>
</header>

<div class="tree" id="tree"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div> Top Level</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1e4070"></div> Domain</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1e3a6e"></div> Cluster</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2e1d6b"></div> Topic</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div> <strong style="color:#a78bfa">Dynamic Capabilities ★</strong></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const data = {
  label: "Business Strategy & Management",
  level: 0,
  desc: "The broad discipline governing how organizations create, deliver, and capture value in competitive environments.",
  children: [
    {
      label: "Strategic Management",
      level: 1,
      desc: "The formulation, implementation, and evaluation of cross-functional decisions that help organizations achieve long-term objectives.",
      children: [
        {
          label: "Competitive Advantage",
          level: 2,
          desc: "The set of factors that allow an organization to outperform rivals and deliver superior value to customers.",
          children: [
            {
              label: "Resource-Based View (RBV)",
              level: 3,
              desc: "A theory positing that competitive advantage stems from the firm's unique bundle of valuable, rare, inimitable, and non-substitutable (VRIN) internal resources.",
              children: [
                {
                  label: "Core Competencies",
                  level: 4,
                  desc: "Deeply embedded abilities and knowledge that differentiate the firm and provide access to diverse markets."
                },
                {
                  label: "Capabilities",
                  level: 4,
                  desc: "What an organization can actually do with its resources — repeatable patterns of action that transform inputs into valuable outputs.",
                  children: [
                    {
                      label: "Dynamic Capabilities",
                      level: 4,
                      isDC: true,
                      desc: "The ability to integrate, build, and reconfigure internal and external competencies to address rapidly changing environments. Coined by Teece, Pisano & Shuen (1997)."
                    }
                  ]
                }
              ]
            },
            {
              label: "Market Positioning",
              level: 3,
              desc: "Porter's view: competitive advantage from occupying a defensible position — cost leadership, differentiation, or focus — within an industry."
            }
          ]
        },
        {
          label: "Organizational Adaptation",
          level: 2,
          desc: "The capacity of an organization to sense environmental shifts and realign its structure, processes, and strategy accordingly.",
          children: [
            {
              label: "Change Management",
              level: 3,
              desc: "Structured approaches to transitioning individuals, teams, and organizations from a current state to a desired future state."
            },
            {
              label: "Innovation Strategy",
              level: 3,
              desc: "Deliberate plans to develop or adopt new products, processes, or business models to sustain competitive advantage."
            }
          ]
        }
      ]
    },
    {
      label: "Operational Management",
      level: 1,
      desc: "Day-to-day activities that design, control, and improve the processes producing goods or services.",
      children: [
        {
          label: "Process Optimization",
          level: 2,
          desc: "Continuous improvement methodologies (Lean, Six Sigma, BPR) that eliminate waste and increase efficiency."
        },
        {
          label: "Supply Chain",
          level: 2,
          desc: "Management of the flow of goods, information, and finances from raw materials to end customer."
        },
        {
          label: "Resource Allocation",
          level: 2,
          desc: "Strategic distribution of financial, human, and physical resources to maximize output and organizational goals."
        }
      ]
    }
  ]
};

function buildNode(node, delay) {
  const wrap = document.createElement('div');
  wrap.className = 'node-wrap';
  wrap.style.animationDelay = delay + 'ms';

  const pill = document.createElement('div');
  pill.className = 'node level-' + node.level + (node.isDC ? ' dc-node' : '');
  pill.dataset.desc = node.desc || '';

  if (node.children && node.children.length) {
    const icon = document.createElement('span');
    icon.className = 'toggle-icon';
    icon.textContent = '▾';
    pill.appendChild(icon);
  }

  const lbl = document.createElement('span');
  lbl.textContent = node.label;
  pill.appendChild(lbl);

  if (node.isDC) {
    const tag = document.createElement('span');
    tag.className = 'dc-label';
    tag.textContent = '★ KEY CONCEPT';
    pill.appendChild(tag);
  }

  wrap.appendChild(pill);

  if (node.children && node.children.length) {
    const childContainer = document.createElement('div');
    childContainer.className = 'children';

    node.children.forEach((child, i) => {
      childContainer.appendChild(buildNode(child, delay + (i + 1) * 60));
    });

    wrap.appendChild(childContainer);

    pill.addEventListener('click', (e) => {
      e.stopPropagation();
      wrap.classList.toggle('collapsed');
    });
    pill.style.cursor = 'pointer';
  }

  return wrap;
}

// Build tree
const tree = document.getElementById('tree');
tree.appendChild(buildNode(data, 0));

// Tooltip
const tooltip = document.getElementById('tooltip');

document.addEventListener('mousemove', (e) => {
  const node = e.target.closest('.node');
  if (node && node.dataset.desc) {
    tooltip.textContent = node.dataset.desc;
    tooltip.style.display = 'block';
    // position near cursor, avoid overflow
    let x = e.clientX + 14;
    let y = e.clientY + 14;
    const rect = tooltip.getBoundingClientRect();
    if (x + 290 > window.innerWidth) x = e.clientX - 290;
    if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - 10;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});
</script>
</body>
</html>
